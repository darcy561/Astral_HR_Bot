services:
  bot:
    build: .
    image: darcy561/astral_hr_bot
    container_name: astral_hr_bot
    depends_on:
      - redis
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - REDIS_HOST=${REDIS_HOST}
      - GUILD_ID=${GUILD_ID}
    networks:
      - default
    ports:
      - "8080:8080"

  redis:
    image: redis:alpine
    container_name: redis_db
    restart: unless-stopped
    networks:
      - default
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
    driver: local

networks:
  default:
    driver: bridge
